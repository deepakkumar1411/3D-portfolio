<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Asset Management System thumbnail">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1220" />
      <stop offset="100%" stop-color="#0f3b4a" />
    </linearGradient>
    <linearGradient id="acc4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg4)" />
  <circle cx="1080" cy="90" r="180" fill="#22d3ee" opacity="0.15" />
  <circle cx="120" cy="620" r="200" fill="#34d399" opacity="0.12" />

  <rect x="72" y="64" width="880" height="128" rx="16" fill="#07101d" opacity="0.9" />
  <text x="104" y="122" fill="#f8fafc" font-size="44" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Asset Management System</text>
  <text x="104" y="164" fill="#99f6e4" font-size="24" font-family="Segoe UI, Arial, sans-serif">Web-based system for efficient asset organization and tracking</text>

  <g transform="translate(90,232)">
    <rect x="0" y="0" width="620" height="360" rx="16" fill="#0b1220" stroke="#1f3348" stroke-width="2" />
    <rect x="24" y="24" width="572" height="52" rx="10" fill="#111b2c" />
    <text x="46" y="57" fill="#67e8f9" font-size="21" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Asset Dashboard</text>

    <rect x="24" y="100" width="250" height="230" rx="12" fill="#0f172a" stroke="#1f3348" />
    <text x="42" y="134" fill="#e2e8f0" font-size="19" font-family="Segoe UI, Arial, sans-serif">Inventory</text>
    <rect x="42" y="150" width="210" height="16" rx="8" fill="#22d3ee" opacity="0.35" />
    <rect x="42" y="178" width="180" height="12" rx="6" fill="#93c5fd" opacity="0.55" />
    <rect x="42" y="200" width="190" height="12" rx="6" fill="#93c5fd" opacity="0.55" />
    <rect x="42" y="222" width="160" height="12" rx="6" fill="#93c5fd" opacity="0.55" />

    <rect x="300" y="100" width="296" height="108" rx="12" fill="#0f172a" stroke="#1f3348" />
    <text x="320" y="134" fill="#e2e8f0" font-size="19" font-family="Segoe UI, Arial, sans-serif">Asset Status</text>
    <rect x="320" y="150" width="256" height="14" rx="7" fill="url(#acc4)" opacity="0.75" />
    <rect x="320" y="176" width="220" height="12" rx="6" fill="#86efac" opacity="0.45" />

    <rect x="300" y="222" width="296" height="108" rx="12" fill="#0f172a" stroke="#1f3348" />
    <text x="320" y="256" fill="#e2e8f0" font-size="19" font-family="Segoe UI, Arial, sans-serif">Transactions</text>
    <rect x="320" y="272" width="256" height="12" rx="6" fill="#34d399" opacity="0.45" />
    <rect x="320" y="294" width="180" height="12" rx="6" fill="#67e8f9" opacity="0.45" />
  </g>

  <g transform="translate(740,232)">
    <rect x="0" y="0" width="370" height="360" rx="16" fill="#0b1220" stroke="url(#acc4)" stroke-width="2" />
    <text x="28" y="52" fill="#f8fafc" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Tech Stack</text>

    <rect x="28" y="78" width="314" height="52" rx="10" fill="#111b2c" />
    <text x="44" y="112" fill="#99f6e4" font-size="20" font-family="Segoe UI, Arial, sans-serif">FastAPI + React + PostgreSQL</text>

    <rect x="28" y="150" width="314" height="52" rx="10" fill="#111b2c" />
    <text x="44" y="184" fill="#bae6fd" font-size="20" font-family="Segoe UI, Arial, sans-serif">SQLAlchemy + Redux Toolkit</text>

    <rect x="28" y="222" width="314" height="108" rx="10" fill="#111b2c" />
    <text x="44" y="258" fill="#f1f5f9" font-size="19" font-family="Segoe UI, Arial, sans-serif">Features:</text>
    <text x="44" y="286" fill="#cbd5e1" font-size="18" font-family="Segoe UI, Arial, sans-serif">• Asset lifecycle tracking</text>
    <text x="44" y="312" fill="#cbd5e1" font-size="18" font-family="Segoe UI, Arial, sans-serif">• Search, allocation, reporting</text>
