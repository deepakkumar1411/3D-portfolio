<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI Code Review Assistant thumbnail">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg3)" />
  <circle cx="1080" cy="90" r="200" fill="#ef4444" opacity="0.12" />
  <circle cx="130" cy="650" r="170" fill="#f59e0b" opacity="0.13" />

  <rect x="70" y="66" width="790" height="120" rx="16" fill="#0b1220" opacity="0.86" />
  <text x="102" y="120" fill="#f8fafc" font-size="44" font-family="Segoe UI, Arial, sans-serif" font-weight="700">AI Code Review Assistant</text>
  <text x="102" y="162" fill="#fdba74" font-size="24" font-family="Segoe UI, Arial, sans-serif">Automated PR analysis with structured LLM feedback</text>

  <g transform="translate(90,240)">
    <rect x="0" y="0" width="560" height="360" rx="16" fill="#0b1220" stroke="#374151" stroke-width="2" />
    <rect x="24" y="24" width="512" height="44" rx="10" fill="#111827" />
    <circle cx="48" cy="46" r="8" fill="#ef4444" />
    <circle cx="74" cy="46" r="8" fill="#f59e0b" />
    <circle cx="100" cy="46" r="8" fill="#22c55e" />

    <text x="30" y="114" fill="#a5b4fc" font-size="24" font-family="Consolas, monospace">+ def validate_input(payload):</text>
    <text x="30" y="154" fill="#86efac" font-size="24" font-family="Consolas, monospace">+     if not payload:</text>
    <text x="30" y="194" fill="#86efac" font-size="24" font-family="Consolas, monospace">+         return {"error": "missing body"}</text>
    <text x="30" y="234" fill="#fca5a5" font-size="24" font-family="Consolas, monospace">- return process(payload)</text>
    <text x="30" y="274" fill="#fde68a" font-size="24" font-family="Consolas, monospace">! review: add schema checks + unit tests</text>
  </g>

  <g transform="translate(700,240)">
    <rect x="0" y="0" width="410" height="360" rx="16" fill="#0b1220" stroke="url(#accent)" stroke-width="2" />
    <rect x="28" y="34" width="354" height="48" rx="12" fill="#1f2937" />
    <text x="46" y="66" fill="#fcd34d" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">AI Review Summary</text>

    <rect x="28" y="104" width="354" height="74" rx="10" fill="#111827" />
    <text x="44" y="134" fill="#e5e7eb" font-size="19" font-family="Segoe UI, Arial, sans-serif">Security: Input validation needed</text>
    <text x="44" y="160" fill="#e5e7eb" font-size="19" font-family="Segoe UI, Arial, sans-serif">Severity: High</text>

    <rect x="28" y="196" width="354" height="74" rx="10" fill="#111827" />
    <text x="44" y="226" fill="#e5e7eb" font-size="19" font-family="Segoe UI, Arial, sans-serif">Performance: Cache repeated calls</text>
    <text x="44" y="252" fill="#e5e7eb" font-size="19" font-family="Segoe UI, Arial, sans-serif">Severity: Medium</text>

    <rect x="28" y="288" width="354" height="48" rx="10" fill="#1f2937" />
    <text x="44" y="319" fill="#fdba74" font-size="20" font-family="Segoe UI, Arial, sans-serif">Estimated review time saved: 30%</text>
  </g>
</svg>
